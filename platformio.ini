; --- Shared base config for all boards ---
; To add a new board, copy the [env:heltec_wireless_tracker] section,
; change the env name, and adjust board/pins/radio/MC_VARIANT/lib_deps.
; See CONTRIBUTING.md for details.

[platformio]
default_envs = heltec_wireless_tracker

[timesyncd]
platform = platformio/espressif32@6.11.0
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
extra_scripts = pre:extra_script.py

build_flags =
  -w -DNDEBUG
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D ESP32_CPU_FREQ=80

  ; --- RadioLib: exclude unused modules ---
  -D RADIOLIB_STATIC_ONLY=1
  -D RADIOLIB_GODMODE=1
  -D RADIOLIB_EXCLUDE_CC1101=1
  -D RADIOLIB_EXCLUDE_RF69=1
  -D RADIOLIB_EXCLUDE_SX1231=1
  -D RADIOLIB_EXCLUDE_SI443X=1
  -D RADIOLIB_EXCLUDE_RFM2X=1
  -D RADIOLIB_EXCLUDE_SX128X=1
  -D RADIOLIB_EXCLUDE_AFSK=1
  -D RADIOLIB_EXCLUDE_AX25=1
  -D RADIOLIB_EXCLUDE_HELLSCHREIBER=1
  -D RADIOLIB_EXCLUDE_MORSE=1
  -D RADIOLIB_EXCLUDE_APRS=1
  -D RADIOLIB_EXCLUDE_BELL=1
  -D RADIOLIB_EXCLUDE_RTTY=1
  -D RADIOLIB_EXCLUDE_SSTV=1

  ; --- MeshCore repeater ---
  -D ADVERT_NAME='"GPS TimeServer"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
  -D ENABLE_ADVERT_ON_BOOT=1
  -D ENABLE_PRIVATE_KEY_IMPORT=1
  -D ENABLE_PRIVATE_KEY_EXPORT=1
  -D DISABLE_WIFI_OTA
  -D BUILD_EXAMPLE=simple_repeater
  -D EXCLUDE_FROM_EXAMPLE=main.cpp
  -D EXCLUDE_FROM_EXAMPLE=UITask.cpp

  ; --- WiFi (set WIFI_SSID and WIFI_PASS env vars) ---
  -D WIFI_SSID=\"${sysenv.WIFI_SSID}\"
  -D WIFI_PASS=\"${sysenv.WIFI_PASS}\"

lib_deps =
  https://github.com/meshcore-dev/MeshCore.git
  ESP32Async/ESPAsyncWebServer @ 3.10.3


; ==========================================================================
; Board: Heltec Wireless Tracker (ESP32-S3 + UC6580 GPS + SX1262 + ST7735)
; ==========================================================================

[env:heltec_wireless_tracker]
extends = timesyncd
board = esp32-s3-devkitc-1

build_flags =
  ${timesyncd.build_flags}

  ; --- MeshCore variant ---
  -D MC_VARIANT=heltec_tracker

  ; --- LoRa radio (SX1262) ---
  -D HELTEC_LORA_V3
  -D USE_SX1262
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D LORA_TX_POWER=22
  -D LORA_FREQ=869.618
  -D LORA_BW=62.5
  -D LORA_SF=8
  -D P_LORA_DIO_1=14
  -D P_LORA_NSS=8
  -D P_LORA_RESET=RADIOLIB_NC
  -D P_LORA_BUSY=13
  -D P_LORA_SCLK=9
  -D P_LORA_MISO=11
  -D P_LORA_MOSI=10
  -D P_LORA_TX_LED=18
  -D SX126X_DIO2_AS_RF_SWITCH=true
  -D SX126X_DIO3_TCXO_VOLTAGE=1.8
  -D SX126X_CURRENT_LIMIT=140
  -D SX126X_RX_BOOSTED_GAIN=1

  ; --- Board pins ---
  -D PIN_BOARD_SDA=45
  -D PIN_BOARD_SCL=46
  -D PIN_USER_BTN=0
  -D PIN_ADC_CTRL=2
  -D PIN_VEXT_EN=3
  -D PIN_TFT_SDA=42
  -D PIN_TFT_SCL=41
  -D PIN_TFT_DC=40
  -D PIN_TFT_RST=39
  -D PIN_TFT_CS=38
  -D USE_PIN_TFT=1
  -D PIN_TFT_LEDA_CTL=21
  -D PIN_GPS_RX=33
  -D PIN_GPS_TX=34
  -D PIN_GPS_EN=35
  -D PIN_GPS_RESET=36
  -D PIN_GPS_RESET_ACTIVE=LOW
  -D GPS_BAUD_RATE=115200
  -D ENV_INCLUDE_GPS=1

  ; --- Display ---
  -D DISPLAY_ROTATION=1
  -D DISPLAY_CLASS=ST7735Display

lib_deps =
  ${timesyncd.lib_deps}
  stevemarple/MicroNMEA @ ^2.0.6
  adafruit/Adafruit ST7735 and ST7789 Library @ ^1.11.0
